name: nextchat
description: A lightweight AI chat application optimized for low-end Android devices.
publish_to: 'none'

version: 0.0.20+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  speech_to_text: ^6.2.1
  flutter_tts: ^0.0.9
  image_picker: ^0.8.5+4
  file_picker: ^5.3.1
  intl: ^0.18.1
  path_provider: ^2.0.11
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.0.5
  uuid: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
