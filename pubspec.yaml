name: nextchat
description: A lightweight AI chat application optimized for low-end Android devices.
publish_to: 'none'

version: 0.0.20+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  speech_to_text: ^6.6.0
  flutter_tts: 4.0.2
  image_picker: ^1.1.1
  file_picker: ^6.1.1
  intl: ^0.19.0
  path_provider: ^2.1.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.1.2
  uuid: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  # assets:
  #   - assets/
