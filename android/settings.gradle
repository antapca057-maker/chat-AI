pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def localPropertiesFile = new File(rootProject.projectDir.parentFile.parentFile, '.flutter-sdk')
        if (localPropertiesFile.exists()) {
            localPropertiesFile.withInputStream { stream ->
                properties.load(stream)
            }
        }
        properties.getProperty('flutter.sdk')
    }

    settings.ext.flutterSdkPath = flutterSdkPath()
    if (settings.ext.flutterSdkPath != null) {
        includeBuild("${settings.ext.flutterSdkPath}/packages/flutter_tools/gradle")
    }

    repositories {
        gradlePluginPortal()
        google()
        mavenCentral()
    }
}

plugins {
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
}

include ':app'

def localPropertiesFile = new File(rootProject.projectDir, 'local.properties')
def properties = new Properties()

if (localPropertiesFile.exists()) {
    localPropertiesFile.withInputStream { stream ->
        properties.load(stream)
    }
}

def flutterSdkPath = properties.getProperty('flutter.sdk')
if (flutterSdkPath == null) {
    flutterSdkPath = System.getenv('FLUTTER_SDK')
}

project(':app').projectDir = new File(rootProject.projectDir, 'app')
