name: Flutter Build

on:
  push:
    branches:
      - main
  workflow_dispatch:   # запуск вручную через вкладку Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Забираем код из репозитория
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Настраиваем Java (необходима для сборщика Gradle в Ubuntu)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Ставим Flutter SDK
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'

      # 4. Подтягиваем зависимости
      - name: Install dependencies
        run: flutter pub get

      # 5. Собираем APK с прошитым ключом из секретов GitHub
      - name: Build APK
        run: flutter build apk --release --dart-define=OPENROUTER_KEY=${{ secrets.OPENROUTER_KEY }}

      # 6. Загружаем APK как артефакт
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
